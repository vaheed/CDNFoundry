server {
    listen 8443 ssl;
    server_name _;
    root /app/public;
    resolver 127.0.0.11 ipv6=off valid=10s;

    ssl_certificate /run/secrets/edge-control-server.crt;
    ssl_certificate_key /run/secrets/edge-control-server.key;
    ssl_client_certificate /run/secrets/edge-identity-ca.crt;
    ssl_verify_client optional;
    ssl_verify_depth 2;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:edge_control_tls:10m;
    ssl_session_timeout 10m;

    client_max_body_size 32k;
    client_header_timeout 10s;
    client_body_timeout 10s;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location = /mtls-health {
        if ($ssl_client_verify != SUCCESS) { return 401; }
        return 200 "ok\n";
    }

    location /edge/v1/ {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_param HTTP_X_EDGE_CERTIFICATE_VERIFY $ssl_client_verify;
        fastcgi_param HTTP_X_EDGE_CERTIFICATE_SERIAL $ssl_client_serial;
        set $php_upstream core:9000;
        fastcgi_pass $php_upstream;
        fastcgi_connect_timeout 3s;
        fastcgi_read_timeout 60s;
    }

    location / { return 404; }
}
