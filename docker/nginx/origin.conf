server {
    listen 80;
    location = /set-cookie { add_header Set-Cookie "session=test"; return 200 "cookie\n"; }
    location = /private { add_header Cache-Control private; return 200 "private\n"; }
    location = /no-store { add_header Cache-Control no-store; return 200 "no-store\n"; }
    location = /vary-star { add_header Vary "*"; return 200 "vary-star\n"; }
    location = /vary-language { add_header Vary "Accept-Language"; return 200 "vary-language\n"; }
    location = /vary-encoding { add_header Vary "Accept-Encoding"; return 200 "vary-encoding\n"; }
    location = /negative { return 404 "negative\n"; }
    location = /redirect { return 302 /; }
    location = /origin-ttl { add_header Cache-Control "public, max-age=1"; return 200 "origin-ttl\n"; }
    location = /stale { add_header Cache-Control "public, max-age=1, stale-if-error=10"; return 200 "stale\n"; }
    location = /large-object { root /tmp; try_files /large-object =404; }
    location = /slow { limit_rate 1k; root /tmp; try_files /large-object =404; }
    location = /graceful { limit_rate 1k; root /tmp; try_files /graceful-object =404; }
    location / {
        default_type application/json;
        return 200 '{"origin":"http","host":"$host"}';
    }
}
