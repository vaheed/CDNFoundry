lua_package_path "/usr/local/openresty/lualib/?.lua;/etc/cdnfoundry/?.lua;;";
lua_shared_dict runtime_limits 10m;
init_worker_by_lua_block { require("runtime").start() }
limit_conn_zone $binary_remote_addr zone=client_connections:10m;
limit_conn_zone $host zone=hostname_connections:10m;
limit_req_zone $binary_remote_addr zone=client_requests:10m rate=100r/s;

upstream edge_origin {
    server 127.0.0.1:9;
    balancer_by_lua_block { require("runtime").balance() }
}

server {
    listen 8080 default_server reuseport;
    listen [::]:8080 default_server reuseport ipv6only=on;
    listen 8443 ssl default_server reuseport;
    listen [::]:8443 ssl default_server reuseport ipv6only=on;
    http2 on;
    server_name _;

    ssl_certificate /run/edge/tls.crt;
    ssl_certificate_key /run/edge/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:edge_runtime_tls:10m;
    ssl_session_timeout 10m;
    ssl_certificate_by_lua_block { require("runtime").select_certificate() }
    http2_max_concurrent_streams 64;

    client_header_timeout 10s;
    client_body_timeout 30s;
    client_max_body_size 16m;
    client_header_buffer_size 2k;
    large_client_header_buffers 4 8k;
    keepalive_timeout 30s;
    keepalive_requests 1000;
    send_timeout 30s;
    limit_conn client_connections 64;
    limit_conn hostname_connections 512;
    limit_req zone=client_requests burst=200 nodelay;

    set $origin_scheme "";
    set $origin_address "";
    set $origin_port "";
    set $origin_host_header "";
    set $origin_sni "";
    set $origin_connection "";
    set $origin_upgrade "";
    set $origin_connect_timeout "1000";
    set $origin_response_timeout "5000";
    set $origin_retry_count "0";

    location = /healthz { access_log off; return 200 "ok\n"; }

    location / {
        access_by_lua_block { require("runtime").access() }
    }

    location @proxy_verified {
        proxy_http_version 1.1;
        proxy_set_header Host $origin_host_header;
        proxy_set_header Connection $origin_connection;
        proxy_set_header Upgrade $origin_upgrade;
        proxy_set_header Forwarded "for=$remote_addr;proto=$scheme;host=$host";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
        proxy_max_temp_file_size 0;
        proxy_ssl_server_name on;
        proxy_ssl_name $origin_sni;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 5;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_pass https://edge_origin;
        log_by_lua_block { require("runtime").record_passive_failure() }
    }

    location @proxy_unverified_https {
        proxy_http_version 1.1;
        proxy_set_header Host $origin_host_header;
        proxy_set_header Connection $origin_connection;
        proxy_set_header Upgrade $origin_upgrade;
        proxy_set_header Forwarded "for=$remote_addr;proto=$scheme;host=$host";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
        proxy_max_temp_file_size 0;
        proxy_ssl_server_name on;
        proxy_ssl_name $origin_sni;
        proxy_ssl_verify off;
        proxy_pass https://edge_origin;
        log_by_lua_block { require("runtime").record_passive_failure() }
    }

    location @proxy_http {
        proxy_http_version 1.1;
        proxy_set_header Host $origin_host_header;
        proxy_set_header Connection $origin_connection;
        proxy_set_header Upgrade $origin_upgrade;
        proxy_set_header Forwarded "for=$remote_addr;proto=$scheme;host=$host";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
        proxy_max_temp_file_size 0;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_pass http://edge_origin;
        log_by_lua_block { require("runtime").record_passive_failure() }
    }
}

server {
    listen 9080;
    listen [::]:9080 ipv6only=on;
    server_name _;
    access_log off;

    location = /passive-failures {
        content_by_lua_block { require("runtime").passive_failures() }
    }

    location = /control {
        client_max_body_size 4k;
        content_by_lua_block { require("runtime").control() }
    }
}
