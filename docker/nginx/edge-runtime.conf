lua_package_path "/usr/local/openresty/lualib/?.lua;/etc/cdnfoundry/?.lua;;";
lua_shared_dict runtime_limits 10m;
init_worker_by_lua_block { require("runtime").start() }

server {
    listen 8080 default_server reuseport;
    server_name _;

    client_header_timeout 10s;
    client_body_timeout 30s;
    client_max_body_size 16m;
    client_header_buffer_size 2k;
    large_client_header_buffers 4 8k;
    keepalive_timeout 30s;
    keepalive_requests 1000;
    send_timeout 30s;

    set $origin_scheme "";
    set $origin_address "";
    set $origin_port "";
    set $origin_host_header "";
    set $origin_sni "";

    location = /healthz { access_log off; return 200 "ok\n"; }

    location / {
        access_by_lua_block { require("runtime").access() }
        proxy_http_version 1.1;
        proxy_set_header Host $origin_host_header;
        proxy_set_header Connection "";
        proxy_set_header Forwarded "for=$remote_addr;proto=$scheme;host=$host";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
        proxy_ssl_server_name on;
        proxy_ssl_name $origin_sni;
        proxy_ssl_verify off;
        proxy_pass $origin_scheme://$origin_address:$origin_port;
    }
}
