location @proxy_verified {
    proxy_intercept_errors on;
    proxy_http_version 1.1;
    proxy_set_header Host $origin_host_header;
    proxy_set_header Connection $origin_connection;
    proxy_set_header Upgrade $origin_upgrade;
    proxy_set_header Forwarded "for=$remote_addr;proto=$http_x_cdn_original_scheme;host=$host";
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $http_x_cdn_original_scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_request_buffering on;
    proxy_buffering on;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
    proxy_max_temp_file_size 100m;
    proxy_ssl_server_name on;
    proxy_ssl_verify on;
    proxy_ssl_verify_depth 5;
    proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    proxy_pass https://edge_origin;
    header_filter_by_lua_block { require("runtime").prepare_cache_response() }
    log_by_lua_block { require("runtime").record_passive_failure() }
}

