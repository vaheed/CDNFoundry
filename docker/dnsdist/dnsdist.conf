setLocal('0.0.0.0:53')
setACL({'0.0.0.0/0', '::/0'})

-- Prometheus reaches this read-only statistics endpoint only on the private
-- DNS network. Configuration-changing API routes remain authenticated and are
-- not enabled by this deployment.
webserver('0.0.0.0:8083')
setWebserverConfig({
  acl='0.0.0.0/0, ::/0',
  statsRequireAuthentication=false,
  apiRequiresAuthentication=true
})

function addResolvedBackends(hostname, addresses)
  for _, address in ipairs(addresses) do
    newServer({address=address:toString(), name=hostname})
  end
end

getAddressInfo('pdns-auth', addResolvedBackends)
setServerPolicy(firstAvailable)

-- Telemetry is best-effort and bounded inside dnsdist/libfstrm. A disconnected
-- Vector endpoint never participates in query processing or backend selection.
function addDnstapLogger(hostname, addresses)
  for _, address in ipairs(addresses) do
    dnstapLogger = newFrameStreamTcpLogger(address:toString() .. ':6000', {
      bufferHint=8192,
      flushTimeout=1,
      inputQueueSize=1024,
      outputQueueSize=1024,
      queueNotifyThreshold=32,
      reopenInterval=1
    })
    addResponseAction(AllRule(), DnstapLogResponseAction('cdnfoundry-dnsdist', dnstapLogger))
    return
  end
end
getAddressInfo('vector', addDnstapLogger)
