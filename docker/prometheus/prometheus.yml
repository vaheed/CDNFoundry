global:
  scrape_interval: 15s
rule_files:
  - /etc/prometheus/telemetry-alerts.yml
alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]
scrape_configs:
  - job_name: cdnfoundry-control
    metrics_path: /metrics
    authorization:
      credentials_file: /run/secrets/metrics-token
    static_configs:
      - targets: [web:8080]
  - job_name: vector
    static_configs:
      - targets: [vector:9598]
  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]
  - job_name: dnsdist
    static_configs:
      - targets: [dnsdist:8083]
  - job_name: powerdns
    static_configs:
      - targets: [pdns-auth:8081]
  - job_name: alertmanager
    static_configs:
      - targets: [alertmanager:9093]
