global:
  scrape_interval: 15s
rule_files:
  - /etc/prometheus/telemetry-alerts.yml
alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]
scrape_configs:
  - job_name: vector
    static_configs:
      - targets: [vector:9598]
  - job_name: alertmanager
    static_configs:
      - targets: [alertmanager:9093]
