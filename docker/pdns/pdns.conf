launch=gpgsql,geoip
geoip-zones-file=/etc/powerdns/geoip-zones.yml
geoip-database-files=mmdb:/mmdb/GeoLite2-City.mmdb;mode=mmap
enable-lua-record-updates=yes
edns-subnet-processing=yes
lua-records-exec-limit=1000
gpgsql-host=pdns-db
gpgsql-port=5432
gpgsql-dbname=pdns
gpgsql-user=pdns
gpgsql-password=pdns-dev-only
api=yes
api-key=pdns-dev-api-key
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0
local-address=0.0.0.0
local-port=53
default-soa-content=ns1.cdnf.test hostmaster.cdnf.test 0 10800 3600 604800 3600
