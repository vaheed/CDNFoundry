name: cdnfoundry

x-core-env: &core-env
  APP_ENV: production
  APP_DEBUG: "false"
  APP_KEY: ${APP_KEY:?APP_KEY is required}
  APP_URL: ${APP_URL:?APP_URL is required}
  DB_CONNECTION: pgsql
  DB_HOST: control-db
  DB_PORT: 5432
  DB_DATABASE: cdnf
  DB_USERNAME: cdnf
  DB_PASSWORD: ${CONTROL_DB_PASSWORD:?CONTROL_DB_PASSWORD is required}
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  REDIS_HOST: redis
  REDIS_CLIENT: predis
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
  GEOIP_DATABASE: /mmdb/GeoLite2-City.mmdb

x-core: &core
  image: ${CDNF_CORE_IMAGE:-cdnfoundry/core:local}
  build:
    context: ./core
    target: production
  environment: *core-env
  depends_on:
    control-db: { condition: service_healthy }
    redis: { condition: service_healthy }
  networks: [control]
  restart: unless-stopped
  read_only: true
  tmpfs: [/tmp]
  volumes: [core-storage:/app/storage, mmdb:/mmdb:ro]

services:
  core:
    <<: *core
    profiles: [control]
    healthcheck:
      test: [CMD, php, -r, "exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    image: nginx:1.30.3-alpine
    profiles: [control]
    ports: ["${CONTROL_BIND:-127.0.0.1:8080}:8080"]
    volumes:
      - ./core/public:/app/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      core: { condition: service_healthy }
    networks: [control, ingress]
    restart: unless-stopped
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:8080/api/health]
      interval: 10s
      timeout: 3s
      retries: 10

  horizon:
    <<: *core
    profiles: [control]
    command: [php, artisan, horizon]

  scheduler:
    <<: *core
    profiles: [control]
    command: [php, artisan, schedule:work]

  migrate:
    <<: *core
    profiles: [tools]
    command: [php, artisan, migrate, --force]
    restart: "no"

  control-db:
    image: postgres:18.4-alpine
    profiles: [control]
    environment:
      POSTGRES_DB: cdnf
      POSTGRES_USER: cdnf
      POSTGRES_PASSWORD: ${CONTROL_DB_PASSWORD}
    volumes: [control-db:/var/lib/postgresql]
    networks: [control]
    restart: unless-stopped
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U cdnf -d cdnf"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: valkey/valkey:9.1.0-alpine
    profiles: [control]
    command: [valkey-server, --appendonly, "yes", --requirepass, "${REDIS_PASSWORD}", --maxmemory, 1gb, --maxmemory-policy, noeviction]
    volumes: [redis:/data]
    networks: [control]
    restart: unless-stopped
    healthcheck:
      test: [CMD-SHELL, "valkey-cli -a '${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  pdns-db:
    image: postgres:18.4-alpine
    profiles: [dns]
    environment:
      POSTGRES_DB: pdns
      POSTGRES_USER: pdns
      POSTGRES_PASSWORD: ${PDNS_DB_PASSWORD:?PDNS_DB_PASSWORD is required}
    volumes:
      - pdns-db:/var/lib/postgresql
      - ./docker/postgres/pdns-schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
    networks: [dns-private]
    restart: unless-stopped
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U pdns -d pdns"]
      interval: 5s
      timeout: 3s
      retries: 20

  pdns-auth:
    image: powerdns/pdns-auth-51:5.1.3
    profiles: [dns]
    environment:
      PDNS_gpgsql_password: ${PDNS_DB_PASSWORD}
      PDNS_api_key: ${PDNS_API_KEY:?PDNS_API_KEY is required}
    volumes:
      - ./docker/pdns/pdns.conf:/etc/powerdns/pdns.conf:ro
      - ./docker/pdns/geoip-zones.yml:/etc/powerdns/geoip-zones.yml:ro
      - mmdb:/mmdb:ro
    depends_on:
      pdns-db: { condition: service_healthy }
    networks: [dns-private]
    restart: unless-stopped

  pdns-migrate:
    image: postgres:18.4-alpine
    profiles: [tools]
    command: [psql, -v, ON_ERROR_STOP=1, -h, pdns-db, -U, pdns, -d, pdns, -f, /migrations/2026_07_17_000001_add_powerdns_metadata_tables.sql]
    environment: { PGPASSWORD: "${PDNS_DB_PASSWORD}" }
    volumes: [./docker/postgres/pdns-migrations:/migrations:ro]
    depends_on:
      pdns-db: { condition: service_healthy }
    networks: [dns-private]
    restart: "no"

  dnsdist:
    image: powerdns/dnsdist-21:2.1.0
    profiles: [dns]
    ports:
      - "${DNS_BIND_V4:-0.0.0.0}:53:53/udp"
      - "${DNS_BIND_V4:-0.0.0.0}:53:53/tcp"
    volumes: [./docker/dnsdist/dnsdist.conf:/etc/dnsdist/dnsdist.conf:ro]
    depends_on: [pdns-auth]
    networks: [dns-private]
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:26.3.12.3-alpine
    profiles: [telemetry]
    environment:
      CLICKHOUSE_DB: cdnf
      CLICKHOUSE_USER: cdnf
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse:/var/lib/clickhouse
      - ./docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    networks: [telemetry]
    restart: unless-stopped

  vector:
    image: timberio/vector:0.55.0-alpine
    profiles: [telemetry, edge]
    volumes:
      - ./docker/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - vector-data:/vector-data-dir
    networks: [telemetry]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.12.0
    profiles: [telemetry]
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus:/prometheus
    networks: [telemetry]
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.32.1
    profiles: [telemetry]
    volumes: [./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro]
    networks: [telemetry]
    restart: unless-stopped

  edge:
    image: openresty/openresty:1.31.1.1-0-alpine
    profiles: [edge]
    ports:
      - "${EDGE_HTTP_BIND:-0.0.0.0:80}:8080"
    volumes:
      - ./docker/nginx/edge-runtime.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/openresty/runtime.lua:/etc/cdnfoundry/runtime.lua:ro
      - edge-cache:/var/cache/nginx
      - edge-state:/var/lib/cdnfoundry
    networks: [edge, telemetry]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"

  edge-agent:
    image: ${CDNF_EDGE_AGENT_IMAGE:-cdnfoundry/edge-agent:local}
    build:
      context: ./edge-agent
    profiles: [edge]
    environment:
      EDGE_CONTROL_URL: ${EDGE_CONTROL_URL:?EDGE_CONTROL_URL is required}
      EDGE_ID: ${EDGE_ID:-}
      EDGE_BOOTSTRAP_TOKEN: ${EDGE_BOOTSTRAP_TOKEN:-}
      EDGE_STATE_DIR: /var/lib/cdnfoundry/agent
      EDGE_RUNTIME_DIR: /var/lib/cdnfoundry/runtime
    volumes:
      - edge-agent-state:/var/lib/cdnfoundry/agent
      - edge-state:/var/lib/cdnfoundry/runtime
    networks: [edge]
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  mmdb-updater:
    image: ${CDNF_MMDB_UPDATER_IMAGE:-cdnfoundry/mmdb-updater:local}
    build:
      context: ./docker/mmdb-updater
    profiles: [edge]
    environment:
      MMDB_PROVIDER: ${MMDB_PROVIDER:-dbip-jsdelivr}
      MMDB_TARGET_FILE: ${MMDB_TARGET_FILE:-GeoLite2-City.mmdb}
      MMDB_DOWNLOAD_INTERVAL_SECONDS: ${MMDB_DOWNLOAD_INTERVAL_SECONDS:-86400}
      MMDB_DOWNLOAD_RETRIES: ${MMDB_DOWNLOAD_RETRIES:-5}
      MMDB_EXPECTED_SHA256: ${MMDB_EXPECTED_SHA256:-}
      MMDB_DOWNLOAD_URL: ${MMDB_DOWNLOAD_URL:-}
      MMDB_DOWNLOAD_HEADER: ${MMDB_DOWNLOAD_HEADER:-}
    volumes: [mmdb:/mmdb]
    networks: [edge]
    restart: unless-stopped
    healthcheck:
      test: [CMD, test, -s, /mmdb/GeoLite2-City.mmdb]
      interval: 30s
      timeout: 3s
      retries: 10
      start_period: 90s

networks:
  control: { internal: true }
  ingress: {}
  dns-private: { internal: true }
  telemetry: { internal: true }
  edge: {}

volumes:
  core-storage: {}
  control-db: {}
  redis: {}
  pdns-db: {}
  clickhouse: {}
  vector-data: {}
  prometheus: {}
  edge-cache: {}
  edge-state: {}
  edge-agent-state: {}
  mmdb: {}
