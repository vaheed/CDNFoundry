services:
  dns-api:
    image: caddy:2.11.4-alpine
    profiles: [dns]
    environment:
      DNS_API_HOSTNAME: ${DNS_API_HOSTNAME:?DNS_API_HOSTNAME is required}
      CONTROL_PUBLIC_IPV4_ALLOWLIST: ${CONTROL_PUBLIC_IPV4_ALLOWLIST:?CONTROL_PUBLIC_IPV4_ALLOWLIST is required}
    ports:
      - "${PUBLIC_BIND_IPV4:?PUBLIC_BIND_IPV4 is required}:8444:8444/tcp"
    volumes:
      - ./deploy/production/Caddyfile.dns-api:/etc/caddy/Caddyfile:ro
      - ${DNS_API_SERVER_CERTIFICATE:?DNS_API_SERVER_CERTIFICATE is required}:/run/secrets/dns-api.crt:ro
      - ${DNS_API_SERVER_PRIVATE_KEY:?DNS_API_SERVER_PRIVATE_KEY is required}:/run/secrets/dns-api.key:ro
      - dns-api-caddy-data:/data
      - dns-api-caddy-config:/config
    depends_on:
      pdns-auth: { condition: service_healthy }
    networks: [dns-private]
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:2019/healthz]
      interval: 10s
      timeout: 3s
      retries: 10

  dnsdist:
    ports:
      - "[${PUBLIC_BIND_IPV6:?PUBLIC_BIND_IPV6 is required}]:53:53/udp"
      - "[${PUBLIC_BIND_IPV6:?PUBLIC_BIND_IPV6 is required}]:53:53/tcp"

volumes:
  dns-api-caddy-data: {}
  dns-api-caddy-config: {}
