name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: PHP, contracts, and assets
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: core/package-lock.json
      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Install frontend dependencies
        run: npm ci
      - name: Check PHP formatting
        run: vendor/bin/pint --test
      - name: Run application tests
        run: php artisan test
      - name: Check OpenAPI contract
        run: php artisan api:openapi --check
      - name: Build frontend assets
        run: npm run build

  compose:
    name: Compose contracts and production images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate development topology
        run: docker compose -f compose.dev.yml config --quiet
      - name: Validate production topology
        run: docker compose --env-file .env.prod.example -f compose.prod.yml config --quiet
      - name: Build every production image from its pinned base
        run: |
          docker build --target production -t cdnfoundry/core:ci core
          docker build --build-arg CORE_IMAGE=cdnfoundry/core:ci --target web -t cdnfoundry/web:ci -f docker/nginx/Dockerfile.production .
          docker build --build-arg CORE_IMAGE=cdnfoundry/core:ci --target edge-control -t cdnfoundry/edge-control:ci -f docker/nginx/Dockerfile.production .
          docker build -t cdnfoundry/edge-runtime:ci -f docker/openresty/Dockerfile .
          docker build -t cdnfoundry/edge-agent:ci edge-agent
          docker build -t cdnfoundry/mmdb-updater:ci docker/mmdb-updater

  backend-e2e:
    name: Python backend and runtime E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - name: Start real development topology
        run: make dev-up
      - name: Apply migrations explicitly
        run: make dev-migrate
      - name: Run Python non-UI E2E
        shell: bash
        run: |
          set +e
          make dev-e2e 2>&1 | tee /tmp/cdnfoundry-e2e.log
          status=${PIPESTATUS[0]}
          if (( status != 0 )); then
            tail -n 25 /tmp/cdnfoundry-e2e.log > /tmp/cdnfoundry-e2e-tail.log
            {
              echo '### Non-UI E2E failure tail'
              echo '```text'
              cat /tmp/cdnfoundry-e2e-tail.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            annotation="$(python3 -c 'import sys; print(sys.stdin.read().replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' < /tmp/cdnfoundry-e2e-tail.log)"
            echo "::error title=Non-UI E2E failed::${annotation}"
          fi
          exit "${status}"
      - name: Capture service state
        if: always()
        run: docker compose -f compose.dev.yml ps
      - name: Capture failure logs
        if: failure()
        run: docker compose -f compose.dev.yml logs --tail=300
      - name: Stop qualification topology
        if: always()
        run: docker compose -f compose.dev.yml down

  scale-e2e:
    name: Bounded DNS dataset and mutation scale
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Start bounded control-plane topology
        run: make dev-scale-up
      - name: Apply migrations explicitly
        run: make dev-migrate
      - name: Run bounded scale qualification
        shell: bash
        run: |
          set +e
          make dev-scale-e2e 2>&1 | tee /tmp/cdnfoundry-scale.log
          status=${PIPESTATUS[0]}
          if (( status != 0 )); then
            tail -n 25 /tmp/cdnfoundry-scale.log > /tmp/cdnfoundry-scale-tail.log
            {
              echo '### Scale qualification failure tail'
              echo '```text'
              cat /tmp/cdnfoundry-scale-tail.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            annotation="$(python3 -c 'import sys; print(sys.stdin.read().replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' < /tmp/cdnfoundry-scale-tail.log)"
            echo "::error title=Scale qualification failed::${annotation}"
          fi
          exit "${status}"
      - name: Capture service state
        if: always()
        run: docker compose -f compose.dev.yml ps
      - name: Capture failure logs
        if: failure()
        run: docker compose -f compose.dev.yml logs --tail=300
      - name: Stop qualification topology
        if: always()
        run: docker compose -f compose.dev.yml down

  go:
    name: Go test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: false
      - name: Test and build every Go module
        shell: bash
        run: |
          mapfile -t modules < <(find . -name go.mod -not -path './.git/*' -printf '%h\n' | sort -u)
          if (( ${#modules[@]} == 0 )); then
            echo 'No Go modules are present yet; nothing to test or build.'
            exit 0
          fi
          for module in "${modules[@]}"; do
            echo "Testing ${module}"
            (cd "${module}" && go test ./... && go build ./...)
          done

  publish-images:
    name: Publish immutable GHCR images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [core, compose, backend-e2e, scale-e2e, go]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build immutable images
        env:
          RELEASE: ${{ github.sha }}
        run: |
          docker build --target production -t ghcr.io/vaheed/cdnfoundry-core:${RELEASE} core
          docker build --build-arg CORE_IMAGE=ghcr.io/vaheed/cdnfoundry-core:${RELEASE} --target web -t ghcr.io/vaheed/cdnfoundry-web:${RELEASE} -f docker/nginx/Dockerfile.production .
          docker build --build-arg CORE_IMAGE=ghcr.io/vaheed/cdnfoundry-core:${RELEASE} --target edge-control -t ghcr.io/vaheed/cdnfoundry-edge-control:${RELEASE} -f docker/nginx/Dockerfile.production .
          docker build -t ghcr.io/vaheed/cdnfoundry-edge-runtime:${RELEASE} -f docker/openresty/Dockerfile .
          docker build -t ghcr.io/vaheed/cdnfoundry-edge-agent:${RELEASE} edge-agent
          docker build -t ghcr.io/vaheed/cdnfoundry-mmdb-updater:${RELEASE} docker/mmdb-updater
      - name: Push immutable images
        env:
          RELEASE: ${{ github.sha }}
        run: |
          docker push ghcr.io/vaheed/cdnfoundry-core:${RELEASE}
          docker push ghcr.io/vaheed/cdnfoundry-web:${RELEASE}
          docker push ghcr.io/vaheed/cdnfoundry-edge-control:${RELEASE}
          docker push ghcr.io/vaheed/cdnfoundry-edge-runtime:${RELEASE}
          docker push ghcr.io/vaheed/cdnfoundry-edge-agent:${RELEASE}
          docker push ghcr.io/vaheed/cdnfoundry-mmdb-updater:${RELEASE}
