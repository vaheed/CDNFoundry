name: cdnfoundry-dev

x-core-env: &core-env
  APP_ENV: local
  APP_DEBUG: "true"
  APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  APP_URL: http://localhost:8080
  DB_CONNECTION: pgsql
  DB_HOST: control-db
  DB_PORT: 5432
  DB_DATABASE: cdnf
  DB_USERNAME: cdnf
  DB_PASSWORD: cdnf-dev-only
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  REDIS_HOST: redis
  REDIS_CLIENT: predis
  GEOIP_DATABASE: /mmdb/GeoLite2-City.mmdb
  ACME_ENABLED: "true"
  ACME_DIRECTORY_URL: https://pebble:14000/dir
  ACME_VERIFY_TLS: "false"
  ACME_CONTACT_EMAIL: admin@example.test
  ACME_INITIAL_JITTER_SECONDS: "1"
  EDGE_IDENTITY_CA_CERTIFICATE: /run/dev-pki/edge-identity-ca.crt
  EDGE_IDENTITY_CA_PRIVATE_KEY: /run/dev-pki/edge-identity-ca.key
  CLICKHOUSE_URL: http://clickhouse:8123
  CLICKHOUSE_DATABASE: cdnf
  CLICKHOUSE_USER: cdnf
  CLICKHOUSE_PASSWORD: cdnf-dev-only
  PROMETHEUS_URL: http://prometheus:9090
  METRICS_TOKEN_FILE: /run/dev-metrics/metrics-token
  RESTIC_REPOSITORY: /app/storage/app/restic
  RESTIC_PASSWORD_FILE: /run/dev-backup/restic-password

x-core: &core
  build:
    context: ./core
    target: development
  environment: *core-env
  volumes:
    - ./core:/app
    - ./docs:/docs
    - ./tests:/tests:ro
    - ./AGENTS.md:/AGENTS.md:ro
    - ./.agents:/.agents:ro
    - core-vendor:/app/vendor
    - core-storage:/app/storage
    - core-bootstrap-cache:/app/bootstrap/cache
    - mmdb:/mmdb:ro
    - dev-pki:/run/dev-pki:ro
    - ./docker/prometheus/dev-metrics-token:/run/dev-metrics/metrics-token:ro
    - ./docker/backup/dev-restic-password:/run/dev-backup/restic-password:ro
  depends_on:
    dev-pki: { condition: service_completed_successfully }
    vendor-init: { condition: service_completed_successfully }
    control-db: { condition: service_healthy }
    redis: { condition: service_healthy }
  networks: [control, telemetry]
  restart: unless-stopped

services:
  dev-pki:
    build:
      context: .
      dockerfile: docker/dev-pki/Dockerfile
    volumes: [dev-pki:/pki]
    restart: "no"

  vendor-init:
    build:
      context: ./core
      target: development
    entrypoint: [sh, -c]
    # Keep the live dependency tree usable while one-off Compose commands refresh it.
    # Packages are overlaid first; authoritative Composer metadata is published last.
    command:
      - >-
        find /opt/cdnf-vendor -mindepth 1 -maxdepth 1 -type d ! -name composer
        -exec cp -a {} /target/ \; &&
        find /opt/cdnf-vendor -mindepth 1 -maxdepth 1 -type f
        -exec cp -a {} /target/ \; &&
        mkdir -p /target/composer &&
        cp -a /opt/cdnf-vendor/composer/. /target/composer/
    volumes: [core-vendor:/target]
    restart: "no"

  core:
    <<: *core
    healthcheck:
      test: [CMD, php, -r, "exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    image: nginx:1.30.3-alpine
    ports: ["8080:8080"]
    volumes:
      - ./core:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      core: { condition: service_healthy }
    networks: [control, ingress]
    restart: unless-stopped
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:8080/api/health]
      interval: 10s
      timeout: 3s
      retries: 10

  edge-control:
    image: nginx:1.30.3-alpine
    ports: ["${CDNF_DEV_EDGE_CONTROL_BIND:-127.0.0.1:9443}:8443"]
    volumes:
      - ./core:/app:ro
      - ./docker/nginx/edge-control.conf:/etc/nginx/conf.d/default.conf:ro
      - dev-pki:/run/secrets:ro
    depends_on:
      dev-pki: { condition: service_completed_successfully }
      core: { condition: service_healthy }
    networks: [control, ingress]
    restart: unless-stopped
    healthcheck:
      test: [CMD, wget, --no-check-certificate, -qO-, https://127.0.0.1:8443/healthz]
      interval: 10s
      timeout: 3s
      retries: 10

  horizon:
    <<: *core
    command: [php, artisan, horizon]
    networks: [control, dns]

  scheduler:
    <<: *core
    command: [php, artisan, schedule:work]

  migrate:
    <<: *core
    command: [php, artisan, migrate, --force]
    restart: "no"
    profiles: [tools]

  control-db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: cdnf
      POSTGRES_USER: cdnf
      POSTGRES_PASSWORD: cdnf-dev-only
    volumes: [control-db:/var/lib/postgresql]
    networks: [control]
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U cdnf -d cdnf"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: valkey/valkey:9.1.0-alpine
    command: [valkey-server, --appendonly, "yes", --maxmemory, 256mb, --maxmemory-policy, noeviction]
    volumes: [redis:/data]
    networks: [control]
    healthcheck:
      test: [CMD, valkey-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 20

  pdns-db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: pdns
      POSTGRES_USER: pdns
      POSTGRES_PASSWORD: pdns-dev-only
    volumes:
      - pdns-db:/var/lib/postgresql
      - ./docker/postgres/pdns-schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
    networks: [dns]
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U pdns -d pdns"]
      interval: 5s
      timeout: 3s
      retries: 20

  pdns-auth:
    image: powerdns/pdns-auth-51:5.1.3
    volumes:
      - ./docker/pdns/pdns.conf:/etc/powerdns/pdns.conf:ro
      - ./docker/pdns/geoip-zones.yml:/etc/powerdns/geoip-zones.yml:ro
      - mmdb:/mmdb:ro
    depends_on:
      pdns-db: { condition: service_healthy }
      mmdb-updater: { condition: service_healthy }
    networks: [dns]
    restart: unless-stopped
    healthcheck:
      test: [CMD, pdns_control, rping]
      interval: 5s
      timeout: 3s
      retries: 20

  pdns-migrate:
    image: postgres:18.4-alpine
    command: [psql, -v, ON_ERROR_STOP=1, -h, pdns-db, -U, pdns, -d, pdns, -f, /migrations/2026_07_17_000001_add_powerdns_metadata_tables.sql]
    environment: { PGPASSWORD: pdns-dev-only }
    volumes: [./docker/postgres/pdns-migrations:/migrations:ro]
    depends_on:
      pdns-db: { condition: service_healthy }
    networks: [dns]
    restart: "no"
    profiles: [tools]

  dnsdist:
    image: powerdns/dnsdist-21:2.1.0
    ports: ["1053:53/udp", "1053:53/tcp"]
    volumes: [./docker/dnsdist/dnsdist.conf:/etc/dnsdist/dnsdist.conf:ro]
    depends_on:
      pdns-auth: { condition: service_healthy }
    networks: [dns]
    restart: unless-stopped
    healthcheck:
      test: [CMD, python3, -c, "import urllib.request; assert urllib.request.urlopen('http://127.0.0.1:8083/metrics', timeout=2).read(1)"]
      interval: 10s
      timeout: 3s
      retries: 10

  pebble:
    image: ghcr.io/letsencrypt/pebble@sha256:ddf230642b1a584f519f32e347de1b05a6e4c1f6c35c1863b33effeab5f78199
    command: [-dnsserver, dnsdist:53]
    environment:
      PEBBLE_VA_NOSLEEP: "1"
      PEBBLE_WFE_NONCEREJECT: "0"
      PEBBLE_AUTHZREUSE: "0"
    depends_on:
      dnsdist: { condition: service_started }
    networks: [control, dns]
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:26.3.12.3-alpine
    environment:
      CLICKHOUSE_DB: cdnf
      CLICKHOUSE_USER: cdnf
      CLICKHOUSE_PASSWORD: cdnf-dev-only
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse:/var/lib/clickhouse
      - ./docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    networks: [telemetry]
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:8123/ping]
      interval: 10s
      timeout: 3s
      retries: 20

  vector:
    image: timberio/vector:0.55.0-alpine
    environment:
      CLICKHOUSE_ENDPOINT: http://clickhouse:8123
      CLICKHOUSE_USER: cdnf
      CLICKHOUSE_PASSWORD: cdnf-dev-only
    volumes:
      - ./docker/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - vector-data:/vector-data-dir
    networks: [telemetry, edge, dns]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.12.0
    ports: ["9090:9090"]
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/telemetry-alerts.yml:/etc/prometheus/telemetry-alerts.yml:ro
      - ./docker/prometheus/alerts.test.yml:/etc/prometheus/alerts.test.yml:ro
      - ./docker/prometheus/dev-metrics-token:/run/secrets/metrics-token:ro
      - prometheus:/prometheus
    networks: [telemetry, control, dns]

  node-exporter:
    image: prom/node-exporter:v1.10.2
    command: [--path.procfs=/host/proc, --path.sysfs=/host/sys, --path.rootfs=/host/root, --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)]
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    networks: [telemetry]
    read_only: true
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.32.1
    ports: ["9093:9093"]
    volumes: [./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro]
    networks: [telemetry]

  origin-http:
    image: nginx:1.30.3-alpine
    command: [sh, -c, "dd if=/dev/zero of=/tmp/large-object bs=1048576 count=2 >/dev/null 2>&1 && dd if=/dev/zero of=/tmp/graceful-object bs=8192 count=1 >/dev/null 2>&1 && exec nginx -g 'daemon off;'"]
    tmpfs: [/tmp:size=4m]
    volumes: [./docker/nginx/origin.conf:/etc/nginx/conf.d/default.conf:ro]
    networks: [edge]

  origin-https:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile.origin-https
    command:
      - sh
      - -c
      - >-
        mkdir -p /run/origin &&
        openssl req -x509 -newkey rsa:2048 -nodes -days 1
        -subj /CN=origin-https
        -addext subjectAltName=DNS:origin-https
        -keyout /run/origin/tls.key -out /run/origin/tls.crt >/dev/null 2>&1 &&
        exec nginx -g 'daemon off;'
    tmpfs: [/run/origin]
    volumes: [./docker/nginx/origin-https.conf:/etc/nginx/conf.d/default.conf:ro]
    networks: [edge]

  edge-a:
    build:
      context: .
      dockerfile: docker/openresty/Dockerfile
    ports: ["8081:8080", "8444:8443"]
    environment:
      EDGE_CELL_NAME: shared-default
      EDGE_RUNTIME_FILE: /var/lib/cdnfoundry/runtime/shared-default.json
      EDGE_STATUS_TOKEN: ${CDNF_DEV_EDGE_STATUS_TOKEN:-cdnf-dev-edge-status-only}
      GEOIP_DATABASE: /mmdb/GeoLite2-City.mmdb
    volumes:
      - dev-pki:/run/edge:ro
      - edge-a-state:/var/lib/cdnfoundry/runtime:ro
      - mmdb:/mmdb:ro
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=256m
      - /var/lib/nginx/tmp:rw,noexec,nosuid,size=64m
    mem_limit: 512m
    cpus: 1
    pids_limit: 128
    ulimits: { nofile: { soft: 65536, hard: 65536 } }
    sysctls: { net.ipv4.tcp_syncookies: "1" }
    networks: [edge]
    depends_on:
      dev-pki: { condition: service_completed_successfully }
      origin-http: { condition: service_started }
      mmdb-updater: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:8080/healthz]
      interval: 10s
      timeout: 3s
      retries: 10

  edge-a-quarantine:
    build:
      context: .
      dockerfile: docker/openresty/Dockerfile
    environment:
      EDGE_CELL_NAME: quarantine-default
      EDGE_RUNTIME_FILE: /var/lib/cdnfoundry/runtime/quarantine-default.json
      EDGE_STATUS_TOKEN: ${CDNF_DEV_EDGE_STATUS_TOKEN:-cdnf-dev-edge-status-only}
      GEOIP_DATABASE: /mmdb/GeoLite2-City.mmdb
    volumes:
      - dev-pki:/run/edge:ro
      - edge-a-state:/var/lib/cdnfoundry/runtime:ro
      - mmdb:/mmdb:ro
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=256m
      - /var/lib/nginx/tmp:rw,noexec,nosuid,size=64m
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 96
    ulimits: { nofile: { soft: 65536, hard: 65536 } }
    sysctls: { net.ipv4.tcp_syncookies: "1" }
    networks: [edge]
    depends_on:
      dev-pki: { condition: service_completed_successfully }
      origin-http: { condition: service_started }
      mmdb-updater: { condition: service_healthy }
    restart: unless-stopped

  edge-agent-a:
    build: ./edge-agent
    profiles: [dev-edge]
    environment:
      EDGE_CONTROL_URL: https://edge-control:8443
      EDGE_CONTROL_CA_CERTIFICATE: /run/dev-pki/edge-server-ca.crt
      EDGE_ID: ${CDNF_DEV_EDGE_A_ID:-}
      EDGE_BOOTSTRAP_TOKEN: ${CDNF_DEV_EDGE_A_BOOTSTRAP_TOKEN:-}
      EDGE_STATE_DIR: /var/lib/cdnfoundry/agent
      EDGE_RUNTIME_DIR: /var/lib/cdnfoundry/runtime
      EDGE_CELL_STATUS_URLS: http://edge-a:9080/passive-failures,http://edge-a-quarantine:9080/passive-failures
      EDGE_STATUS_TOKEN: ${CDNF_DEV_EDGE_STATUS_TOKEN:-cdnf-dev-edge-status-only}
    volumes:
      - edge-a-agent-state:/var/lib/cdnfoundry/agent
      - edge-a-state:/var/lib/cdnfoundry/runtime
      - dev-pki:/run/dev-pki:ro
    networks: [control, edge]
    depends_on:
      edge-control: { condition: service_healthy }
      edge-a: { condition: service_healthy }
      edge-a-quarantine: { condition: service_started }
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    mem_limit: 128m
    cpus: 0.25
    pids_limit: 64

  edge-b:
    build:
      context: .
      dockerfile: docker/openresty/Dockerfile
    ports: ["8082:8080", "8445:8443"]
    environment:
      EDGE_CELL_NAME: shared-default
      EDGE_RUNTIME_FILE: /var/lib/cdnfoundry/runtime/shared-default.json
      EDGE_STATUS_TOKEN: ${CDNF_DEV_EDGE_STATUS_TOKEN:-cdnf-dev-edge-status-only}
      GEOIP_DATABASE: /mmdb/GeoLite2-City.mmdb
    volumes:
      - dev-pki:/run/edge:ro
      - edge-b-state:/var/lib/cdnfoundry/runtime:ro
      - mmdb:/mmdb:ro
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=256m
      - /var/lib/nginx/tmp:rw,noexec,nosuid,size=64m
    mem_limit: 512m
    cpus: 1
    pids_limit: 128
    ulimits: { nofile: { soft: 65536, hard: 65536 } }
    sysctls: { net.ipv4.tcp_syncookies: "1" }
    networks: [edge]
    depends_on:
      dev-pki: { condition: service_completed_successfully }
      origin-http: { condition: service_started }
      mmdb-updater: { condition: service_healthy }
    restart: unless-stopped
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:8080/healthz]
      interval: 10s
      timeout: 3s
      retries: 10

  edge-b-quarantine:
    build:
      context: .
      dockerfile: docker/openresty/Dockerfile
    environment:
      EDGE_CELL_NAME: quarantine-default
      EDGE_RUNTIME_FILE: /var/lib/cdnfoundry/runtime/quarantine-default.json
      EDGE_STATUS_TOKEN: ${CDNF_DEV_EDGE_STATUS_TOKEN:-cdnf-dev-edge-status-only}
      GEOIP_DATABASE: /mmdb/GeoLite2-City.mmdb
    volumes:
      - dev-pki:/run/edge:ro
      - edge-b-state:/var/lib/cdnfoundry/runtime:ro
      - mmdb:/mmdb:ro
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=256m
      - /var/lib/nginx/tmp:rw,noexec,nosuid,size=64m
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 96
    ulimits: { nofile: { soft: 65536, hard: 65536 } }
    sysctls: { net.ipv4.tcp_syncookies: "1" }
    networks: [edge]
    depends_on:
      dev-pki: { condition: service_completed_successfully }
      origin-http: { condition: service_started }
      mmdb-updater: { condition: service_healthy }
    restart: unless-stopped

  edge-agent-b:
    build: ./edge-agent
    profiles: [dev-edge]
    environment:
      EDGE_CONTROL_URL: https://edge-control:8443
      EDGE_CONTROL_CA_CERTIFICATE: /run/dev-pki/edge-server-ca.crt
      EDGE_ID: ${CDNF_DEV_EDGE_B_ID:-}
      EDGE_BOOTSTRAP_TOKEN: ${CDNF_DEV_EDGE_B_BOOTSTRAP_TOKEN:-}
      EDGE_STATE_DIR: /var/lib/cdnfoundry/agent
      EDGE_RUNTIME_DIR: /var/lib/cdnfoundry/runtime
      EDGE_CELL_STATUS_URLS: http://edge-b:9080/passive-failures,http://edge-b-quarantine:9080/passive-failures
      EDGE_STATUS_TOKEN: ${CDNF_DEV_EDGE_STATUS_TOKEN:-cdnf-dev-edge-status-only}
    volumes:
      - edge-b-agent-state:/var/lib/cdnfoundry/agent
      - edge-b-state:/var/lib/cdnfoundry/runtime
      - dev-pki:/run/dev-pki:ro
    networks: [control, edge]
    depends_on:
      edge-control: { condition: service_healthy }
      edge-b: { condition: service_healthy }
      edge-b-quarantine: { condition: service_started }
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    mem_limit: 128m
    cpus: 0.25
    pids_limit: 64

  poweradmin:
    image: poweradmin/poweradmin:4.3.3
    profiles: [devtools]
    ports: ["9191:80"]
    environment:
      DB_TYPE: pgsql
      DB_HOST: pdns-db
      DB_PORT: 5432
      DB_NAME: pdns
      DB_USER: pdns
      DB_PASS: pdns-dev-only
      PA_CREATE_ADMIN: "true"
      PA_ADMIN_USERNAME: ${POWERADMIN_ADMIN_USERNAME:-admin}
      PA_ADMIN_PASSWORD: ${POWERADMIN_ADMIN_PASSWORD:-poweradmin-dev-only}
      PA_ADMIN_EMAIL: admin@example.test
      PA_ADMIN_FULLNAME: CDNFoundry Developer
      DNS_NS1: ns1.cdnf.test
      DNS_NS2: ns2.cdnf.test
      DNS_HOSTMASTER: hostmaster.cdnf.test
    depends_on:
      pdns-db: { condition: service_healthy }
    networks: [dns]
    restart: unless-stopped

  mmdb-updater:
    build:
      context: ./docker/mmdb-updater
    environment:
      MMDB_PROVIDER: ${MMDB_PROVIDER:-dbip-jsdelivr}
      MMDB_TARGET_FILE: ${MMDB_TARGET_FILE:-GeoLite2-City.mmdb}
      MMDB_DOWNLOAD_INTERVAL_SECONDS: ${MMDB_DOWNLOAD_INTERVAL_SECONDS:-86400}
      MMDB_DOWNLOAD_RETRIES: ${MMDB_DOWNLOAD_RETRIES:-5}
    volumes: [mmdb:/mmdb]
    networks: [telemetry]
    restart: unless-stopped
    healthcheck:
      test: [CMD, test, -s, /mmdb/GeoLite2-City.mmdb]
      interval: 30s
      timeout: 3s
      retries: 10
      start_period: 90s

networks:
  control: { internal: true }
  ingress: {}
  dns: {}
  edge: {}
  telemetry: {}

volumes:
  core-vendor: {}
  core-storage: {}
  core-bootstrap-cache: {}
  control-db: {}
  redis: {}
  pdns-db: {}
  clickhouse: {}
  vector-data: {}
  prometheus: {}
  mmdb: {}
  dev-pki: {}
  edge-a-state: {}
  edge-a-agent-state: {}
  edge-b-state: {}
  edge-b-agent-state: {}
