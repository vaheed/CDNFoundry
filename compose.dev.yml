name: cdnfoundry-dev

x-core-env: &core-env
  APP_ENV: local
  APP_DEBUG: "true"
  APP_URL: http://localhost:8080
  DB_CONNECTION: pgsql
  DB_HOST: control-db
  DB_PORT: 5432
  DB_DATABASE: cdnf
  DB_USERNAME: cdnf
  DB_PASSWORD: cdnf-dev-only
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  REDIS_HOST: redis
  REDIS_CLIENT: predis
  GEOIP_DATABASE: /mmdb/GeoLite2-City.mmdb

x-core: &core
  build:
    context: ./core
    target: development
  environment: *core-env
  volumes:
    - ./core:/app
    - ./docs:/docs
    - ./tests:/tests:ro
    - ./AGENTS.md:/AGENTS.md:ro
    - ./.agents:/.agents:ro
    - core-vendor:/app/vendor
    - core-storage:/app/storage
    - core-bootstrap-cache:/app/bootstrap/cache
    - mmdb:/mmdb:ro
  depends_on:
    vendor-init: { condition: service_completed_successfully }
    control-db: { condition: service_healthy }
    redis: { condition: service_healthy }
  networks: [control]
  restart: unless-stopped

services:
  vendor-init:
    build:
      context: ./core
      target: development
    entrypoint: [sh, -c]
    # Keep the live dependency tree usable while one-off Compose commands refresh it.
    # Packages are overlaid first; authoritative Composer metadata is published last.
    command:
      - >-
        find /opt/cdnf-vendor -mindepth 1 -maxdepth 1 -type d ! -name composer
        -exec cp -a {} /target/ \; &&
        find /opt/cdnf-vendor -mindepth 1 -maxdepth 1 -type f
        -exec cp -a {} /target/ \; &&
        mkdir -p /target/composer &&
        cp -a /opt/cdnf-vendor/composer/. /target/composer/
    volumes: [core-vendor:/target]
    restart: "no"

  core:
    <<: *core
    healthcheck:
      test: [CMD, php, -r, "exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    image: nginx:1.30.3-alpine
    ports: ["8080:8080"]
    volumes:
      - ./core:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      core: { condition: service_healthy }
    networks: [control, ingress]
    restart: unless-stopped
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:8080/api/health]
      interval: 10s
      timeout: 3s
      retries: 10

  horizon:
    <<: *core
    command: [php, artisan, horizon]
    networks: [control, dns]

  scheduler:
    <<: *core
    command: [php, artisan, schedule:work]

  migrate:
    <<: *core
    command: [php, artisan, migrate, --force]
    restart: "no"
    profiles: [tools]

  control-db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: cdnf
      POSTGRES_USER: cdnf
      POSTGRES_PASSWORD: cdnf-dev-only
    volumes: [control-db:/var/lib/postgresql]
    networks: [control]
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U cdnf -d cdnf"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: valkey/valkey:9.1.0-alpine
    command: [valkey-server, --appendonly, "yes", --maxmemory, 256mb, --maxmemory-policy, noeviction]
    volumes: [redis:/data]
    networks: [control]
    healthcheck:
      test: [CMD, valkey-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 20

  pdns-db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: pdns
      POSTGRES_USER: pdns
      POSTGRES_PASSWORD: pdns-dev-only
    volumes:
      - pdns-db:/var/lib/postgresql
      - ./docker/postgres/pdns-schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
    networks: [dns]
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U pdns -d pdns"]
      interval: 5s
      timeout: 3s
      retries: 20

  pdns-auth:
    image: powerdns/pdns-auth-51:5.1.3
    volumes:
      - ./docker/pdns/pdns.conf:/etc/powerdns/pdns.conf:ro
      - ./docker/pdns/geoip-zones.yml:/etc/powerdns/geoip-zones.yml:ro
      - mmdb:/mmdb:ro
    depends_on:
      pdns-db: { condition: service_healthy }
    networks: [dns]
    restart: unless-stopped

  pdns-migrate:
    image: postgres:18.4-alpine
    command: [psql, -v, ON_ERROR_STOP=1, -h, pdns-db, -U, pdns, -d, pdns, -f, /migrations/2026_07_17_000001_add_powerdns_metadata_tables.sql]
    environment: { PGPASSWORD: pdns-dev-only }
    volumes: [./docker/postgres/pdns-migrations:/migrations:ro]
    depends_on:
      pdns-db: { condition: service_healthy }
    networks: [dns]
    restart: "no"
    profiles: [tools]

  dnsdist:
    image: powerdns/dnsdist-21:2.1.0
    ports: ["1053:53/udp", "1053:53/tcp"]
    volumes: [./docker/dnsdist/dnsdist.conf:/etc/dnsdist/dnsdist.conf:ro]
    depends_on: [pdns-auth]
    networks: [dns]
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:26.3.12.3-alpine
    environment:
      CLICKHOUSE_DB: cdnf
      CLICKHOUSE_USER: cdnf
      CLICKHOUSE_PASSWORD: cdnf-dev-only
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse:/var/lib/clickhouse
      - ./docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    networks: [telemetry]
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1:8123/ping]
      interval: 10s
      timeout: 3s
      retries: 20

  vector:
    image: timberio/vector:0.55.0-alpine
    volumes:
      - ./docker/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - vector-data:/vector-data-dir
    networks: [telemetry]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.12.0
    ports: ["9090:9090"]
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus:/prometheus
    networks: [telemetry]

  alertmanager:
    image: prom/alertmanager:v0.32.1
    ports: ["9093:9093"]
    volumes: [./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro]
    networks: [telemetry]

  origin-http:
    image: nginx:1.30.3-alpine
    volumes: [./docker/nginx/origin.conf:/etc/nginx/conf.d/default.conf:ro]
    networks: [edge]

  origin-https:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile.origin-https
    command:
      - sh
      - -c
      - >-
        mkdir -p /run/origin &&
        openssl req -x509 -newkey rsa:2048 -nodes -days 1
        -subj /CN=origin-https
        -addext subjectAltName=DNS:origin-https
        -keyout /run/origin/tls.key -out /run/origin/tls.crt >/dev/null 2>&1 &&
        exec nginx -g 'daemon off;'
    tmpfs: [/run/origin]
    volumes: [./docker/nginx/origin-https.conf:/etc/nginx/conf.d/default.conf:ro]
    networks: [edge]

  edge-a:
    image: openresty/openresty:1.31.1.1-0-alpine
    ports: ["8081:8080"]
    volumes: [./docker/nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro]
    networks: [edge]
    depends_on: [origin-http]

  edge-b:
    image: openresty/openresty:1.31.1.1-0-alpine
    ports: ["8082:8080"]
    volumes: [./docker/nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro]
    networks: [edge]
    depends_on: [origin-http]

  poweradmin:
    image: poweradmin/poweradmin:4.3.3
    profiles: [devtools]
    ports: ["9191:80"]
    environment:
      DB_TYPE: pgsql
      DB_HOST: pdns-db
      DB_PORT: 5432
      DB_NAME: pdns
      DB_USER: pdns
      DB_PASS: pdns-dev-only
      PA_CREATE_ADMIN: "true"
      PA_ADMIN_USERNAME: ${POWERADMIN_ADMIN_USERNAME:-admin}
      PA_ADMIN_PASSWORD: ${POWERADMIN_ADMIN_PASSWORD:-poweradmin-dev-only}
      PA_ADMIN_EMAIL: admin@example.test
      PA_ADMIN_FULLNAME: CDNFoundry Developer
      DNS_NS1: ns1.cdnf.test
      DNS_NS2: ns2.cdnf.test
      DNS_HOSTMASTER: hostmaster.cdnf.test
    depends_on:
      pdns-db: { condition: service_healthy }
    networks: [dns]
    restart: unless-stopped

  mmdb-updater:
    build:
      context: ./docker/mmdb-updater
    environment:
      MMDB_PROVIDER: ${MMDB_PROVIDER:-dbip-jsdelivr}
      MMDB_TARGET_FILE: ${MMDB_TARGET_FILE:-GeoLite2-City.mmdb}
      MMDB_DOWNLOAD_INTERVAL_SECONDS: ${MMDB_DOWNLOAD_INTERVAL_SECONDS:-86400}
      MMDB_DOWNLOAD_RETRIES: ${MMDB_DOWNLOAD_RETRIES:-5}
    volumes: [mmdb:/mmdb]
    networks: [telemetry]
    restart: unless-stopped
    healthcheck:
      test: [CMD, test, -s, /mmdb/GeoLite2-City.mmdb]
      interval: 30s
      timeout: 3s
      retries: 10
      start_period: 90s

networks:
  control: { internal: true }
  ingress: {}
  dns: {}
  edge: {}
  telemetry: {}

volumes:
  core-vendor: {}
  core-storage: {}
  core-bootstrap-cache: {}
  control-db: {}
  redis: {}
  pdns-db: {}
  clickhouse: {}
  vector-data: {}
  prometheus: {}
  mmdb: {}
